<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Chrysanthemum (菊花) - Chinese 1 Yuan coin style -->
  <g fill="none" stroke="rgba(40,40,50,0.8)" stroke-width="1.2">
    <!-- Outer petals -->
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(24 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(48 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(72 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(96 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(120 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(144 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(168 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(192 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(216 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(240 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(264 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(288 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(312 50 50)"/>
    <ellipse cx="50" cy="20" rx="4" ry="14" transform="rotate(336 50 50)"/>
    <!-- Inner petals -->
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(12 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(36 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(84 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(108 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(132 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(156 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(204 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(228 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(252 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(276 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(300 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(324 50 50)"/>
    <ellipse cx="50" cy="30" rx="3" ry="10" transform="rotate(348 50 50)"/>
    <!-- Center -->
    <circle cx="50" cy="50" r="8" fill="rgba(40,40,50,0.6)"/>
